<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Building Institutes — A Global Gathering 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Montserrat", sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #fff;
  color: #111;
}

/* ── STICKY CONTROLS ────────────────────────────────────────────────────── */
.controls-bar {
  background: #fff;
  border-bottom: 1px solid #eaecf0;
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 14px 24px;
}
.controls-inner {
  max-width: 1160px;
  margin: 0 auto;
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.tz-group {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.tz-label {
  font-size: 0.78rem;
  font-weight: 700;
  color: #122345;
  white-space: nowrap;
}
.tz-select {
  padding: 8px 11px;
  border-radius: 9px;
  border: 1.5px solid #e8eaed;
  background: #fff;
  font-family: "Montserrat", sans-serif;
  font-weight: 500;
  font-size: 0.82rem;
  max-width: 240px;
  cursor: pointer;
  color: #111;
}
.ctrl-divider { width: 1px; height: 28px; background: #e8eaed; flex-shrink: 0; }
.filter-toggle {
  border: 1.5px solid #e8eaed;
  padding: 7px 16px;
  border-radius: 50px;
  background: #fff;
  font-family: "Montserrat", sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  color: #555;
  transition: all .18s ease;
  white-space: nowrap;
}
.filter-toggle:hover { border-color: #122345; color: #122345; }
.filter-toggle.active { background: #122345; color: #fff; border-color: #122345; }

/* ── SPEAKER VIEW BUTTON ────────────────────────────────────────────────── */
.view-toggle {
  border: 1.5px solid #e8eaed;
  padding: 7px 16px;
  border-radius: 50px;
  background: #fff;
  font-family: "Montserrat", sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  color: #555;
  transition: all .18s ease;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.view-toggle:hover { border-color: #187089; color: #187089; }
.view-toggle.active { background: #187089; color: #fff; border-color: #187089; }
.view-toggle svg { flex-shrink: 0; }

/* ── SPEAKER GRID ───────────────────────────────────────────────────────── */
#speakerContent { display: none; }
#speakerContent.visible { display: block; }
.speaker-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  align-items: start;
}
.sp-card {
  background: #fff;
  border-radius: 16px;
  border: 1.5px solid #e8eaed;
  padding: 20px;
  transition: box-shadow .2s ease, transform .2s ease;
}
.sp-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
.sp-card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}
.sp-photo {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #e8eaed;
  background: #e8eaed;
  flex-shrink: 0;
}
.sp-name {
  font-size: 0.95rem;
  font-weight: 700;
  color: #122345;
  line-height: 1.2;
  margin-bottom: 3px;
}
.sp-title {
  font-size: 0.72rem;
  font-weight: 600;
  color: #187089;
  line-height: 1.3;
}
.sp-org {
  font-size: 0.7rem;
  color: #888;
  margin-top: 2px;
}
.sp-bio {
  font-size: 0.78rem;
  line-height: 1.6;
  color: #444;
  margin-bottom: 8px;
  white-space: pre-line;
}
.sp-bio.clamped {
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.sp-expand-btn {
  border: none;
  background: none;
  font-family: "Montserrat", sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  color: #187089;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 0 0 12px;
  transition: color .15s;
}
.sp-expand-btn:hover { color: #122345; }
.sp-expand-icon { display: inline-block; transition: transform .22s ease; font-size: 0.65rem; }
.sp-expand-icon.open { transform: rotate(180deg); }
.sp-session-label {
  font-size: 0.6rem;
  font-weight: 800;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 6px;
}
.sp-session-tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #f0f2f5;
  border-radius: 8px;
  padding: 6px 10px;
  cursor: pointer;
  transition: background .15s;
  border: none;
  font-family: "Montserrat", sans-serif;
  text-align: left;
  width: 100%;
}
.sp-session-tag:hover { background: #e8f4f8; }
.sp-session-tag-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: #122345;
  line-height: 1.3;
  flex: 1;
}
.sp-session-time {
  font-size: 0.68rem;
  color: #187089;
  font-weight: 600;
  white-space: nowrap;
}

/* ── SESSION POPUP (speaker view) ───────────────────────────────────────── */
#sessionPopup {
  display: none;
  position: fixed;
  z-index: 9998;
  width: 300px;
  pointer-events: none;
}
#sessionPopup .sp-popup-inner {
  background: #fff;
  border: 1.5px solid #e8eaed;
  border-radius: 14px;
  padding: 16px;
  box-shadow: 0 10px 32px rgba(0,0,0,0.14);
}
.sp-popup-session-title {
  font-size: 0.88rem;
  font-weight: 700;
  color: #122345;
  line-height: 1.3;
  margin-bottom: 4px;
}
.sp-popup-subtitle {
  font-size: 0.72rem;
  font-weight: 600;
  color: #187089;
  margin-bottom: 8px;
}
.sp-popup-time {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.7rem;
  font-weight: 700;
  color: #fff;
  background: #122345;
  border-radius: 50px;
  padding: 3px 10px;
  margin-bottom: 10px;
}
.sp-popup-desc {
  font-size: 0.75rem;
  line-height: 1.55;
  color: #555;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.sp-popup-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.sp-popup-tag {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  background: #f0f2f5;
  color: #666;
  padding: 2px 7px;
  border-radius: 50px;
}

/* ── MAIN LAYOUT ────────────────────────────────────────────────────────── */
.main {
  max-width: 1160px;
  margin: 0 auto;
  padding: 32px 16px 60px;
}

/* ── SLOT SECTION ───────────────────────────────────────────────────────── */
.slot-section { margin-bottom: 36px; }
.slot-header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.slot-time {
  font-size: 1.05rem;
  font-weight: 700;
  color: #122345;
  white-space: nowrap;
}
.slot-tz-abbr {
  font-size: 0.8rem;
  font-weight: 600;
  color: #187089;
}
.slot-badge {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 50px;
  background: #edf7fa;
  color: #187089;
}
.slot-badge.green { background: #edf7ed; color: #4a8a4a; }
.slot-badge.neutral { background: #f2f4f7; color: #888; }

/* ── SESSION GRID ───────────────────────────────────────────────────────── */
.session-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
  align-items: start;
}

/* ── SESSION CARD ───────────────────────────────────────────────────────── */
.session-card {
  background: #fff;
  border-radius: 16px;
  border: 1.5px solid #e8eaed;
  overflow: visible;
  transition: transform .2s ease, box-shadow .2s ease;
  display: flex;
  flex-direction: column;
}
.session-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.09); }

.card-accent {
  height: 5px;
  background: linear-gradient(90deg, #122345, #187089);
  border-radius: 14px 14px 0 0;
}

.card-body { padding: 18px 20px 0; flex: 1; }

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.card-tag {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 50px;
  background: #f0f2f5;
  color: #666;
}

.card-title {
  font-size: 1.02rem;
  font-weight: 700;
  color: #122345;
  line-height: 1.3;
  margin-bottom: 6px;
}
.card-subtitle {
  font-size: 0.82rem;
  font-weight: 600;
  color: #187089;
  margin-bottom: 14px;
  line-height: 1.3;
}

/* ── SPEAKER ROW ────────────────────────────────────────────────────────── */
.card-speakers {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.speaker-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: default;
  position: relative;
}
.speaker-photo {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #e8eaed;
  background: #e8eaed;
  flex-shrink: 0;
}
.speaker-name { font-size: 0.82rem; font-weight: 700; color: #122345; }
.speaker-role { font-size: 0.72rem; color: #888; }

/* ── DESCRIPTION ────────────────────────────────────────────────────────── */
.card-desc {
  font-size: 0.88rem;
  line-height: 1.6;
  color: #444;
  margin-bottom: 16px;
}
.card-desc.clamped {
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── EXPAND TOGGLE ──────────────────────────────────────────────────────── */
.card-footer {
  padding: 0 20px 18px;
  display: flex;
  align-items: center;
}
.expand-btn {
  border: none;
  background: none;
  font-family: "Montserrat", sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  color: #187089;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0;
  transition: color .15s;
}
.expand-btn:hover { color: #122345; }
.expand-icon {
  display: inline-block;
  transition: transform .25s ease;
  font-size: 0.7rem;
}
.expand-icon.open { transform: rotate(180deg); }

/* ── EXPANDED DETAIL ────────────────────────────────────────────────────── */
.card-detail {
  display: none;
  padding: 0 20px 22px;
}
.card-detail.open { display: block; }

.objectives-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 4px;
  margin-bottom: 8px;
}
@media (max-width: 560px) { .objectives-grid { grid-template-columns: 1fr; } }

.obj-block {
  background: #f8fafb;
  border-radius: 10px;
  padding: 12px 14px;
  border-left: 3px solid #122345;
}
.obj-block.teal { border-left-color: #187089; }
.obj-block.green { border-left-color: #4a8a4a; }
.obj-block.purple { border-left-color: #7040aa; }

.obj-label {
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #122345;
  margin-bottom: 4px;
}
.obj-block.teal .obj-label { color: #187089; }
.obj-block.green .obj-label { color: #4a8a4a; }
.obj-block.purple .obj-label { color: #7040aa; }

.obj-sublabel {
  font-size: 0.72rem;
  font-weight: 600;
  color: #888;
  margin-bottom: 8px;
  font-style: italic;
}

.obj-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.obj-list li {
  font-size: 0.8rem;
  line-height: 1.4;
  color: #333;
  padding-left: 14px;
  position: relative;
}
.obj-list li::before {
  content: "→";
  position: absolute;
  left: 0;
  font-size: 0.7rem;
  color: #187089;
  top: 1px;
}

/* ── EMPTY STATE ────────────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: #888;
  display: none;
}
.empty-state.visible { display: block; }
.empty-state p { font-size: 0.95rem; font-weight: 600; }

/* ── RESPONSIVE ─────────────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .controls-inner { flex-direction: column; align-items: flex-start; }
  .ctrl-divider { display: none; }
  .session-grid { grid-template-columns: 1fr; }
  .objectives-grid { grid-template-columns: 1fr; }
  .tz-select { max-width: 100%; width: 100%; }
}
</style>
</head>
<body>

<!-- STICKY CONTROLS -->
<div class="controls-bar">
  <div class="controls-inner">
    <div class="tz-group">
      <span class="tz-label">Time zone</span>
      <select class="tz-select" id="timezoneSelect"></select>
    </div>
    <div class="ctrl-divider"></div>
    <button class="filter-toggle" id="filterDayEve">Daytime &amp; Evening Hours</button>
    <div class="ctrl-divider"></div>
    <button class="view-toggle" id="toggleSpeakers">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M1 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
        <path d="M14 13c0-1.93-1.12-3.6-2.75-4.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Show Speakers
    </button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="mainContent"></div>
<div class="empty-state" id="emptyState">
  <p>No sessions match the current filter.</p>
</div>

<!-- SPEAKER VIEW -->
<div class="main" id="speakerContent">
  <div class="speaker-grid" id="speakerGrid"></div>
</div>

<!-- SESSION POPUP -->
<div id="sessionPopup"><div class="sp-popup-inner">
  <div class="sp-popup-session-title" id="spTitle"></div>
  <div class="sp-popup-subtitle" id="spSubtitle"></div>
  <div class="sp-popup-time" id="spTime"></div>
  <div class="sp-popup-desc" id="spDesc"></div>
  <div class="sp-popup-tags" id="spTags"></div>
</div></div>

<!-- GLOBAL SPEAKER TOOLTIP -->
<div id="globalTooltip" style="display:none;position:fixed;z-index:9999;pointer-events:none;width:270px;">
  <div style="background:#fff;border:1.5px solid #e8eaed;border-radius:12px;padding:14px;box-shadow:0 8px 28px rgba(0,0,0,0.15);">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <img id="ttPhoto" src="" alt="" style="width:48px;height:48px;border-radius:50%;object-fit:cover;border:2px solid #e8eaed;background:#e8eaed;flex-shrink:0;">
      <div>
        <div id="ttName" style="font-size:0.88rem;font-weight:700;color:#122345;line-height:1.2;"></div>
        <div id="ttTitle" style="font-size:0.72rem;color:#187089;font-weight:600;margin-top:2px;"></div>
        <div id="ttOrg" style="font-size:0.7rem;color:#888;margin-top:1px;"></div>
      </div>
    </div>
    <div id="ttBio" style="font-size:0.75rem;line-height:1.5;color:#444;border-top:1px solid #f0f2f5;padding-top:8px;white-space:pre-line;"></div>
  </div>
</div>

<script>
// ─── TIMEZONE SETUP ────────────────────────────────────────────────────────
const tzMap = {
  "America/New_York":"EDT","America/Chicago":"CDT","America/Denver":"MDT",
  "America/Los_Angeles":"PDT","America/Anchorage":"AKDT","America/Phoenix":"MST",
  "Pacific/Honolulu":"HST","America/Toronto":"EDT","America/Vancouver":"PDT",
  "America/Edmonton":"MDT","America/Winnipeg":"CDT","America/Halifax":"ADT",
  "America/St_Johns":"NDT","America/Mexico_City":"CST","America/Panama":"COT",
  "America/Bogota":"COT","America/Caracas":"VET","America/Sao_Paulo":"BRT",
  "America/Argentina/Buenos_Aires":"ART","America/Santiago":"CLST",
  "Europe/London":"BST","Europe/Paris":"CEST","Europe/Berlin":"CEST",
  "Europe/Rome":"CEST","Europe/Madrid":"CEST","Africa/Lagos":"WAT",
  "Africa/Cairo":"EET","Africa/Johannesburg":"SAST","Africa/Nairobi":"EAT",
  "Asia/Riyadh":"AST","Asia/Dubai":"GST","Asia/Karachi":"PKT",
  "Asia/Kolkata":"IST","Asia/Dhaka":"BDST","Asia/Bangkok":"ICT",
  "Asia/Jakarta":"WIB","Asia/Singapore":"SGT","Asia/Manila":"PHT",
  "Asia/Shanghai":"CST","Asia/Taipei":"CST","Asia/Seoul":"KST","Asia/Tokyo":"JST",
  "Australia/Perth":"AWST","Australia/Adelaide":"ACDT","Australia/Brisbane":"AEST",
  "Australia/Sydney":"AEDT","Pacific/Auckland":"NZDT","Pacific/Fiji":"FJT"
};
const tzFlags = {
  "America/New_York":"🇺🇸","America/Chicago":"🇺🇸","America/Denver":"🇺🇸",
  "America/Los_Angeles":"🇺🇸","America/Anchorage":"🇺🇸","America/Phoenix":"🇺🇸",
  "Pacific/Honolulu":"🇺🇸","America/Toronto":"🇨🇦","America/Vancouver":"🇨🇦",
  "America/Edmonton":"🇨🇦","America/Winnipeg":"🇨🇦","America/Halifax":"🇨🇦",
  "America/St_Johns":"🇨🇦","America/Mexico_City":"🇲🇽","America/Panama":"🇵🇦",
  "America/Bogota":"🇨🇴","America/Caracas":"🇻🇪","America/Sao_Paulo":"🇧🇷",
  "America/Argentina/Buenos_Aires":"🇦🇷","America/Santiago":"🇨🇱",
  "Europe/London":"🇬🇧","Europe/Paris":"🇫🇷","Europe/Berlin":"🇩🇪",
  "Europe/Rome":"🇮🇹","Europe/Madrid":"🇪🇸","Africa/Lagos":"🇳🇬",
  "Africa/Cairo":"🇪🇬","Africa/Johannesburg":"🇿🇦","Africa/Nairobi":"🇰🇪",
  "Asia/Riyadh":"🇸🇦","Asia/Dubai":"🇦🇪","Asia/Karachi":"🇵🇰",
  "Asia/Kolkata":"🇮🇳","Asia/Dhaka":"🇧🇩","Asia/Bangkok":"🇹🇭",
  "Asia/Jakarta":"🇮🇩","Asia/Singapore":"🇸🇬","Asia/Manila":"🇵🇭",
  "Asia/Shanghai":"🇨🇳","Asia/Taipei":"🇹🇼","Asia/Seoul":"🇰🇷","Asia/Tokyo":"🇯🇵",
  "Australia/Perth":"🇦🇺","Australia/Adelaide":"🇦🇺","Australia/Brisbane":"🇦🇺",
  "Australia/Sydney":"🇦🇺","Pacific/Auckland":"🇳🇿","Pacific/Fiji":"🇫🇯"
};
const allZones = Object.keys(tzFlags);

function getUtcOffsetMinutes(zone) {
  const ref = new Date("2026-10-06T12:00:00Z");
  const s = new Intl.DateTimeFormat("en-CA",{timeZone:zone,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false}).format(ref);
  const [dp,tp] = s.split(", ");
  return (new Date(`${dp}T${tp}Z`) - ref) / 60000;
}

function easternToUtc(dateStr, timeStr) {
  const [y,m,d] = dateStr.split("-").map(Number);
  const [h,mi] = timeStr.split(":").map(Number);
  return new Date(Date.UTC(y, m-1, d, h+7, mi)); // stored times are in PDT (UTC-7)
}
function formatInTz(dt, tz) {
  return new Intl.DateTimeFormat("en-US",{hour:"numeric",minute:"2-digit",timeZone:tz}).format(dt);
}
function getLocalDateStr(dt, tz) {
  return new Intl.DateTimeFormat("en-CA",{timeZone:tz,year:"numeric",month:"2-digit",day:"2-digit"}).format(dt);
}
function getTzAbbr(tz) { return tzMap[tz] || ""; }

// Build timezone selector
const browserZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
const sel = document.getElementById("timezoneSelect");
const sortedZones = allZones.slice().sort((a,b)=>getUtcOffsetMinutes(a)-getUtcOffsetMinutes(b));
const orderedZones = [browserZone, ...sortedZones.filter(z=>z!==browserZone)];
if (!allZones.includes(browserZone)) orderedZones.push(browserZone);
orderedZones.forEach(z => {
  const city = z.split("/").pop().replaceAll("_"," ");
  const abbr = tzMap[z]||"";
  const flag = tzFlags[z]||"";
  const opt = document.createElement("option");
  opt.value = z;
  opt.textContent = `${flag} ${abbr ? `${city} (${abbr})` : city}${z===browserZone?" — detected":""}`;
  sel.appendChild(opt);
});

// ─── TIME CATEGORY ─────────────────────────────────────────────────────────
function getLocalMinutes(dt, tz) {
  const parts = new Intl.DateTimeFormat("en-US",{hour:"numeric",minute:"numeric",hour12:false,timeZone:tz}).formatToParts(dt);
  const h = parseInt(parts.find(p=>p.type==="hour").value,10);
  const m = parseInt(parts.find(p=>p.type==="minute").value,10);
  return h*60+m;
}
function getOverlap(s,e,ws,we) { return Math.max(0,Math.min(e,we)-Math.max(s,ws)); }
function getTimeCategory(sUtc, eUtc, tz) {
  let s = getLocalMinutes(sUtc, tz);
  let e = getLocalMinutes(eUtc, tz);
  if (e<=s) e+=1440;
  const DAY_S=420, DAY_E=1020, EVE_S=1020, EVE_E=1290;
  const total=e-s;
  const day=getOverlap(s,e,DAY_S,DAY_E);
  const eve=getOverlap(s,e,EVE_S,EVE_E);
  const out=total-day-eve;
  if (out>day&&out>eve) return "neutral";
  if (eve>day) return "evening";
  return "daytime";
}

function buildTimeLabel(sUtc, eUtc, tz) {
  const sDateStr = getLocalDateStr(sUtc, tz);
  const eDateStr = getLocalDateStr(eUtc, tz);
  const s = formatInTz(sUtc, tz);
  const e = formatInTz(eUtc, tz);
  const eventDate = "2026-10-06";
  if (sDateStr===eDateStr) {
    if (sDateStr<eventDate) return `${s} – ${e} (prev. day)`;
    if (sDateStr>eventDate) return `${s} – ${e} (next day)`;
    return `${s} – ${e}`;
  }
  if (sDateStr<eDateStr) {
    if (sDateStr<eventDate) return `${s} (prev. day) – ${e}`;
    return `${s} – ${e} (next day)`;
  }
  return `${s} – ${e}`;
}

// ─── TIME SLOTS ────────────────────────────────────────────────────────────
const slotOrder = ["2026-10-06T06:00","2026-10-06T10:00","2026-10-06T12:00","2026-10-06T14:00","2026-10-06T16:00"];
const slotMap = {};
sessions.forEach(s => {
  const k = s.startDate + "T" + s.startTime;
  if (!slotMap[k]) slotMap[k] = [];
  slotMap[k].push(s);
});

// Build speaker lookup for tooltip
const speakerLookup = {};
sessions.forEach(s => s.speakers.forEach((sp,i) => { speakerLookup[`${s.code}-${i}`] = sp; }));

// ─── STATE ─────────────────────────────────────────────────────────────────
let showDayEveOnly = false;

// ─── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const tz = sel.value;
  const abbr = getTzAbbr(tz);
  const main = document.getElementById("mainContent");
  main.innerHTML = "";
  let anyVisible = false;

  slotOrder.forEach(slotKey => {
    const slotSessions = slotMap[slotKey] || [];
    if (!slotSessions.length) return;

    const visible = slotSessions.filter(s => {
      if (!showDayEveOnly) return true;
      const sU = easternToUtc(s.startDate, s.startTime);
      const eU = easternToUtc(s.endDate, s.endTime);
      return getTimeCategory(sU, eU, tz) !== "neutral";
    });

    if (!visible.length) return;
    anyVisible = true;

    const firstS = slotSessions[0];
    const sUtc = easternToUtc(firstS.startDate, firstS.startTime);
    const eUtc = easternToUtc(firstS.endDate, firstS.endTime);
    const cat = getTimeCategory(sUtc, eUtc, tz);
    const timeLabel = buildTimeLabel(sUtc, eUtc, tz);
    const sessionCount = visible.length;

    const section = document.createElement("div");
    section.className = "slot-section";

    const catBadge = cat === "daytime"
      ? `<span class="slot-badge green">Daytime</span>`
      : cat === "evening"
        ? `<span class="slot-badge">Evening</span>`
        : `<span class="slot-badge neutral">Off-hours</span>`;

    section.innerHTML = `
      <div class="slot-header">
        <span class="slot-time">${timeLabel}</span>
        <span class="slot-tz-abbr">${abbr}</span>
        ${catBadge}
        <span style="font-size:0.75rem;color:#aaa;">${sessionCount} session${sessionCount!==1?"s":""}</span>
      </div>
      <div class="session-grid" id="grid-${slotKey.replace(/[:-]/g,'_')}"></div>
    `;

    const grid = section.querySelector(".session-grid");

    visible.forEach(s => {
      const tagsHtml = s.tagLabels.map(t=>`<span class="card-tag">${t}</span>`).join("");

      const speakersHtml = s.speakers.map((sp,i) => {
        const imgSrc = sp.photo || `https://placehold.co/32x32/e8eaed/888?text=${encodeURIComponent((sp.name||"?")[0])}`;
        return `
          <div class="speaker-chip" data-si="${s.code}-${i}">
            <img class="speaker-photo" src="${imgSrc}" alt="${sp.name}"
              onerror="this.src='https://placehold.co/32x32/e8eaed/888?text=${encodeURIComponent((sp.name||"?")[0])}'">
            <div>
              <div class="speaker-name">${sp.name}</div>
              ${sp.org ? `<div class="speaker-role">${sp.org}</div>` : ""}
            </div>
          </div>
        `;
      }).join("");

      const objKeys = ["why","how","practice","transfer"];
      const objHtml = objKeys.map(k => {
        const o = s.objectives[k];
        return `
          <div class="obj-block ${o.cls||''}">
            <div class="obj-label">${o.label}</div>
            <div class="obj-sublabel">${o.sub}</div>
            <ul class="obj-list">${o.items.map(it=>`<li>${it}</li>`).join("")}</ul>
          </div>
        `;
      }).join("");

      const card = document.createElement("div");
      card.className = "session-card";
      card.dataset.code = s.code;
      card.innerHTML = `
        <div class="card-accent"></div>
        <div class="card-body">
          <div class="card-tags">${tagsHtml}</div>
          <div class="card-title">${s.title}</div>
          <div class="card-subtitle">${s.subtitle}</div>
          <div class="card-speakers">${speakersHtml}</div>
          <div class="card-desc clamped" id="desc-${s.code}">${s.description}</div>
        </div>
        <div class="card-footer">
          <button class="expand-btn" onclick="toggleCard(this,'${s.code}')" aria-expanded="false">
            View full details <span class="expand-icon" id="icon-${s.code}">▼</span>
          </button>
        </div>
        <div class="card-detail" id="detail-${s.code}">
          <div class="objectives-grid">${objHtml}</div>
        </div>
      `;
      grid.appendChild(card);
    });

    main.appendChild(section);
  });

  document.getElementById("emptyState").classList.toggle("visible", !anyVisible);

  attachTooltips();
  notifyHeight();
}

function toggleCard(btn, code) {
  const desc   = document.getElementById("desc-"+code);
  const detail = document.getElementById("detail-"+code);
  const icon   = document.getElementById("icon-"+code);
  const isOpen = detail.classList.contains("open");

  if (isOpen) {
    desc.classList.add("clamped");
    detail.classList.remove("open");
    icon.classList.remove("open");
    btn.childNodes[0].textContent = "View full details ";
    btn.setAttribute("aria-expanded","false");
  } else {
    desc.classList.remove("clamped");
    detail.classList.add("open");
    icon.classList.add("open");
    btn.childNodes[0].textContent = "Hide details ";
    btn.setAttribute("aria-expanded","true");
  }
  notifyHeight();
}

// ─── TOOLTIP ───────────────────────────────────────────────────────────────
const tt      = document.getElementById("globalTooltip");
const ttPhoto = document.getElementById("ttPhoto");
const ttName  = document.getElementById("ttName");
const ttTitle = document.getElementById("ttTitle");
const ttOrg   = document.getElementById("ttOrg");
const ttBio   = document.getElementById("ttBio");

function attachTooltips() {
  document.querySelectorAll(".speaker-chip").forEach(chip => {
    const key = chip.dataset.si;
    const sp = speakerLookup[key];
    if (!sp) return;

    chip.addEventListener("mouseenter", () => {
      const imgSrc = sp.photo || "";
      ttPhoto.src = imgSrc;
      ttPhoto.style.display = imgSrc ? "block" : "none";
      ttName.textContent  = sp.name;
      ttTitle.textContent = sp.title || "";
      ttOrg.textContent   = sp.org || "";
      ttBio.textContent   = sp.shortBio || sp.bio || "";

      const rect = chip.getBoundingClientRect();
      let top  = rect.top - 220 - 12;
      if (top < 8) top = rect.bottom + 12;
      let left = rect.left;
      if (left + 275 > window.innerWidth) left = window.innerWidth - 280;

      tt.style.top  = top + "px";
      tt.style.left = left + "px";
      tt.style.display = "block";
    });
    chip.addEventListener("mouseleave", () => { tt.style.display = "none"; });
  });
}

// ─── FILTER TOGGLE ─────────────────────────────────────────────────────────
document.getElementById("filterDayEve").addEventListener("click", function() {
  showDayEveOnly = !showDayEveOnly;
  this.classList.toggle("active", showDayEveOnly);
  render();
});

sel.addEventListener("change", () => { render(); if (speakerViewActive) renderSpeakers(); });

function toggleSpBio(btn, id) {
  const bio  = document.getElementById(id);
  const icon = btn.querySelector(".sp-expand-icon");
  const isOpen = !bio.classList.contains("clamped");
  if (isOpen) {
    bio.classList.add("clamped");
    icon.classList.remove("open");
    btn.childNodes[0].textContent = "Show full details ";
  } else {
    bio.classList.remove("clamped");
    icon.classList.add("open");
    btn.childNodes[0].textContent = "Hide details ";
  }
  notifyHeight();
}

// ─── SPEAKER VIEW ──────────────────────────────────────────────────────────
let speakerViewActive = false;
const speakerContent = document.getElementById("speakerContent");
const mainContent    = document.getElementById("mainContent");
const emptyState     = document.getElementById("emptyState");
const sessionPopup   = document.getElementById("sessionPopup");

// Build flat speaker list: one entry per speaker across all sessions
function getAllSpeakers() {
  const list = [];
  sessions.forEach(s => {
    s.speakers.forEach(sp => {
      list.push({ sp, session: s });
    });
  });
  // Sort alphabetically by last name
  list.sort((a, b) => {
    const aLast = a.sp.name.trim().split(" ").pop();
    const bLast = b.sp.name.trim().split(" ").pop();
    return aLast.localeCompare(bLast);
  });
  return list;
}

function renderSpeakers() {
  const tz   = sel.value;
  const abbr = (tzMap[tz] || "");
  const grid = document.getElementById("speakerGrid");
  grid.innerHTML = "";

  getAllSpeakers().forEach(({ sp, session: s }, i) => {
    const sUtc = easternToUtc(s.startDate, s.startTime);
    const eUtc = easternToUtc(s.endDate,   s.endTime);
    const timeLabel = buildTimeLabel(sUtc, eUtc, tz);
    const imgSrc = sp.photo || `https://placehold.co/56x56/e8eaed/888?text=${encodeURIComponent((sp.name||"?")[0])}`;

    const card = document.createElement("div");
    card.className = "sp-card";
    card.innerHTML = `
      <div class="sp-card-header">
        <img class="sp-photo" src="${imgSrc}" alt="${sp.name}"
          onerror="this.src='https://placehold.co/56x56/e8eaed/888?text=${encodeURIComponent((sp.name||"?")[0])}'">
        <div>
          <div class="sp-name">${sp.name}</div>
          <div class="sp-title">${sp.title || ""}</div>
          ${sp.org ? `<div class="sp-org">${sp.org}</div>` : ""}
        </div>
      </div>
      <div class="sp-bio clamped" id="spbio-${s.code}-${i}">${sp.bio || ""}</div>
      <button class="sp-expand-btn" onclick="toggleSpBio(this,'spbio-${s.code}-${i}')">Show full details <span class="sp-expand-icon" id="spicon-${s.code}-${i}">▼</span></button>
      <div class="sp-session-label">Skill Building Institute</div>
      <button class="sp-session-tag" data-code="${s.code}">
        <div class="sp-session-tag-title">${s.title}</div>
        <div class="sp-session-time">${timeLabel}${abbr ? " " + abbr : ""}</div>
      </button>
    `;

    // Session popup on hover of the tag button
    const tagBtn = card.querySelector(".sp-session-tag");
    tagBtn.addEventListener("mouseenter", e => showSessionPopup(s, tagBtn, tz, abbr));
    tagBtn.addEventListener("mouseleave", hideSessionPopup);
    tagBtn.addEventListener("focus",      e => showSessionPopup(s, tagBtn, tz, abbr));
    tagBtn.addEventListener("blur",       hideSessionPopup);

    grid.appendChild(card);
  });
}

function showSessionPopup(s, anchor, tz, abbr) {
  const sUtc = easternToUtc(s.startDate, s.startTime);
  const eUtc = easternToUtc(s.endDate,   s.endTime);
  document.getElementById("spTitle").textContent    = s.title;
  document.getElementById("spSubtitle").textContent = s.subtitle;
  document.getElementById("spTime").textContent     = buildTimeLabel(sUtc, eUtc, tz) + (abbr ? " " + abbr : "");
  document.getElementById("spDesc").textContent     = s.description;
  document.getElementById("spTags").innerHTML       = s.tagLabels.map(t => `<span class="sp-popup-tag">${t}</span>`).join("");

  sessionPopup.style.display = "block";
  const rect  = anchor.getBoundingClientRect();
  const popW  = sessionPopup.offsetWidth  || 300;
  const popH  = sessionPopup.offsetHeight || 200;
  const gap   = 10;
  // prefer right of anchor, flip left if needed, clamp to viewport
  let left = rect.right + gap;
  if (left + popW > window.innerWidth - 8)  left = rect.left - popW - gap;
  if (left < 8) left = 8;
  // align top to anchor, clamp so bottom stays in view
  let top = rect.top;
  if (top + popH > window.innerHeight - 8)  top = window.innerHeight - popH - 8;
  if (top < 8) top = 8;
  sessionPopup.style.top  = top  + "px";
  sessionPopup.style.left = left + "px";
}
function hideSessionPopup() { sessionPopup.style.display = "none"; }

document.getElementById("toggleSpeakers").addEventListener("click", function() {
  speakerViewActive = !speakerViewActive;
  this.classList.toggle("active", speakerViewActive);
  this.querySelector("span") && (this.querySelector("span").textContent = "");
  // update button label
  this.innerHTML = `
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="6" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/>
      <path d="M1 13c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="12" cy="5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
      <path d="M14 13c0-1.93-1.12-3.6-2.75-4.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    ${speakerViewActive ? "Show Sessions" : "Show Speakers"}
  `;

  if (speakerViewActive) {
    mainContent.style.display = "none";
    emptyState.style.display  = "none";
    speakerContent.classList.add("visible");
    renderSpeakers();
  } else {
    mainContent.style.display = "";
    speakerContent.classList.remove("visible");
    hideSessionPopup();
    render();
  }
  notifyHeight();
});

// ─── IFRAME AUTO-RESIZE ────────────────────────────────────────────────────
function notifyHeight() {
  const h = document.documentElement.scrollHeight;
  if (window.parent !== window) window.parent.postMessage({ ggWidgetHeight: h }, "*");
}
notifyHeight();
if (typeof ResizeObserver !== "undefined") {
  new ResizeObserver(notifyHeight).observe(document.body);
} else {
  window.addEventListener("resize", notifyHeight);
}

// Init
render();
</script>
</body>
</html>
